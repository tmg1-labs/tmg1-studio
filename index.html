<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMG1 Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body class="no-project">
    <header class="toolbar">
      <button id="new-btn" class="primary no-project-only">新規作成</button>
      <button id="load-btn" class="no-project-only">開く</button>
      <button id="save-btn" class="project-only">保存</button>
      <button id="close-btn" class="project-only">閉じる</button>
      <span id="file-info" class="file-info project-only">動画が未読み込みです</span>
      <div class="spacer project-only"></div>
      <label class="spec project-only">幅 <input id="out-w" type="number" min="8" step="8" value="128" /></label>
      <label class="spec project-only">高さ <input id="out-h" type="number" min="1" step="1" value="64" /></label>
      <label class="spec project-only">fps <input id="out-fps" type="number" min="1" step="1" value="15" /></label>
      <button id="export-btn" class="primary project-only" disabled>エクスポート</button>
      <div class="settings-wrap">
        <button id="settings-btn" class="icon-btn" title="設定" aria-label="設定">⚙</button>
        <div id="settings-menu" class="settings-menu" hidden>
          <div class="settings-head">設定</div>
          <div class="settings-row">
            <span>バージョン</span>
            <span id="app-version" class="mono">—</span>
          </div>
        </div>
      </div>
    </header>

    <div id="start-hint" class="start-hint no-project-only">
      <div>
        <h1>TMG1 Studio</h1>
        <p>「新規作成」で動画を読み込むか、「読み込み」で既存のプロジェクトを開いてください。</p>
      </div>
    </div>

    <main class="workspace project-only">
      <section class="preview-pane">
        <div class="pane-head">
          <h2>プレビュー（monob 出力）</h2>
          <label class="zoom-ctrl">
            表示
            <select id="zoom">
              <option value="window">ウィンドウに合わせる</option>
              <option value="25">25%</option>
              <option value="50">50%</option>
              <option value="100">100%</option>
              <option value="200">200%</option>
              <option value="300">300%</option>
              <option value="400">400%</option>
            </select>
          </label>
        </div>
        <div class="preview-frame">
          <img id="preview-img" alt="preview" />
          <video id="preview-video" loop muted playsinline></video>
          <p id="preview-placeholder" class="placeholder">動画を読み込むと、ここに 1bit プレビューが表示されます</p>
        </div>
        <p id="preview-meta" class="meta"></p>
      </section>

      <aside class="params-pane">
        <h2>区間パラメータ</h2>
        <p id="seg-label" class="seg-label">—</p>

        <label class="param">
          <span>コントラスト <b id="contrast-val">1.00</b></span>
          <input id="contrast" type="range" min="0.5" max="2.0" step="0.01" value="1.0" disabled />
        </label>

        <label class="param">
          <span>レベル下限 (黒潰し) <b id="lo-val">0</b></span>
          <input id="level-lo" type="range" min="0" max="254" step="1" value="0" disabled />
        </label>

        <label class="param">
          <span>レベル上限 (白飛ばし) <b id="hi-val">255</b></span>
          <input id="level-hi" type="range" min="1" max="255" step="1" value="255" disabled />
        </label>

        <label class="param">
          <span>ディザ</span>
          <select id="dither" disabled>
            <option value="bayer">Bayer</option>
            <option value="ed">誤差拡散 (ed)</option>
            <option value="none">なし</option>
          </select>
        </label>

        <div class="preset-section">
          <h2>プリセット</h2>
          <div class="preset-row">
            <select id="preset-list"></select>
            <button id="preset-apply">適用</button>
          </div>
          <div class="preset-row">
            <input id="preset-name" placeholder="プリセット名" />
            <button id="preset-save">保存</button>
            <button id="preset-delete" class="danger">削除</button>
          </div>
        </div>
      </aside>
    </main>

    <footer class="timeline-pane project-only">
      <div class="timeline-header">
        <button id="play-btn" class="primary" disabled>▶ 再生</button>
        <button id="range-set-start" title="再生位置を範囲の始点に設定" disabled>始点に設定</button>
        <button id="range-set-end" title="再生位置を範囲の終点に設定" disabled>終点に設定</button>
        <button id="range-to-seg" disabled>区間を範囲に</button>
        <button id="range-clear" title="範囲を全体に戻す" disabled>範囲解除</button>
        <span id="time-readout" class="time-readout">00:00.00 / 00:00.00</span>
        <div class="spacer"></div>
        <button id="split-btn" disabled>ここで分割</button>
        <button id="delete-btn" disabled>区間を結合削除</button>
      </div>
      <div id="timeline" class="timeline"></div>
      <input id="scrub" class="scrub" type="range" min="0" max="1000" step="1" value="0" disabled />
      <p id="status" class="status"></p>
    </footer>

    <div id="confirm-modal" class="modal-overlay" hidden>
      <div class="modal">
        <p id="confirm-msg" class="modal-msg">保存されていない変更があります。</p>
        <div class="modal-actions">
          <button id="modal-save" class="primary">保存する</button>
          <button id="modal-discard" class="danger">保存しない</button>
          <button id="modal-cancel">キャンセル</button>
        </div>
      </div>
    </div>
  </body>
</html>
