name: CI

# push/PR ゲート。フロント(tsc + vite build)と backend(cargo test + clippy)を
# ubuntu で検証する。Tauri の Rust 側は webkit2gtk 等のシステムライブラリを要するため
# apt で導入する（リリース用インストーラのビルドはしない＝チェック専用）。
on:
  push:
    branches: [main, 'feature/**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # --- Tauri v2 の Linux ビルド依存（Ubuntu 24.04 系）---
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf

      # --- フロントエンド (TypeScript + Vite) ---
      - uses: actions/setup-node@v5  # v5 で Node24 ランタイム化(Node20 deprecation 警告を解消)
        with:
          node-version: '20'
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Build frontend (tsc --noEmit + vite build)
        run: npm run build

      # --- バックエンド (Rust / Tauri) ---
      # ツールチェーン(clippy 含む)は src-tauri/rust-toolchain.toml で固定。
      # ランナーの rustup が最初の cargo 実行時に該当バージョンを自動導入する。
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo test
        working-directory: src-tauri
        run: cargo test

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
